<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Compras — MASTERISADO</title>
  <script src="/admin/layout.js"></script>
  <style id="base-css"></style>
  <style>
    .tabs { display:flex; gap:4px; margin-bottom:20px; border-bottom:2px solid #e8eaf0; }
    .tab { padding:10px 18px; cursor:pointer; font-size:13px; font-weight:600; color:#888; border-bottom:3px solid transparent; margin-bottom:-2px; }
    .tab.active { color:#4A90D9; border-bottom-color:#4A90D9; }
    .tab-content { display:none; } .tab-content.active { display:block; }
    .estado-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
    .detalle-item { display:grid; grid-template-columns:2fr 1fr 1fr 1fr auto; gap:10px; align-items:center; padding:10px 0; border-bottom:1px solid #f0f0f5; }
    .detalle-item:last-child { border-bottom:none; }
  </style>
</head>
<body>
<header>
  <h1>MASTERISADO</h1>
  <div class="header-right">
    <span id="usuario-nombre"></span>
    <form action="/logout" method="POST" style="margin:0"><button type="submit" class="btn-logout">Salir</button></form>
  </div>
</header>
<nav id="nav-links"></nav>

<main>
  <h2 style="font-size:16px;color:#1a1a2e;margin-bottom:20px">🛒 Compras y Proveedores</h2>

  <div class="tabs">
    <div class="tab active" onclick="cambiarTab('ordenes')">📋 Órdenes de Compra</div>
    <div class="tab" onclick="cambiarTab('proveedores')">🏢 Proveedores</div>
  </div>

  <!-- ORDENES -->
  <div class="tab-content active" id="tab-ordenes">
    <div class="top-bar">
      <div></div>
      <button class="btn btn-success" onclick="abrirNuevaOrden()">+ Nueva orden de compra</button>
    </div>
    <div class="card">
      <div class="tabla-wrap">
        <table>
          <thead><tr><th>#</th><th>Proveedor</th><th>Estado</th><th>Total</th><th>Ítems</th><th>Fecha</th><th>Acciones</th></tr></thead>
          <tbody id="tabla-ordenes"><tr><td colspan="7" style="text-align:center;color:#aaa;padding:30px">Cargando...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- PROVEEDORES -->
  <div class="tab-content" id="tab-proveedores">
    <div class="top-bar">
      <div></div>
      <button class="btn btn-success" onclick="abrirModalProv()">+ Nuevo proveedor</button>
    </div>
    <div class="card">
      <div class="tabla-wrap">
        <table>
          <thead><tr><th>Nombre</th><th>NIT</th><th>Teléfono</th><th>Email</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody id="tabla-proveedores"><tr><td colspan="6" style="text-align:center;color:#aaa;padding:30px">Cargando...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Modal nueva orden -->
<div class="modal-overlay" id="modal-orden" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto">
  <div class="modal" style="max-width:700px">
    <div class="modal-title">Nueva orden de compra</div>
    <div class="form-row">
      <div class="campo"><label>Proveedor *</label><select id="o-proveedor"><option value="">Seleccionar...</option></select></div>
      <div class="campo"><label>Notas</label><input id="o-notas" placeholder="Observaciones..."/></div>
    </div>
    <div class="card-title" style="margin:16px 0 10px">Ítems de la orden</div>
    <div id="o-items"></div>
    <button class="btn btn-primary btn-sm" style="margin-bottom:16px" onclick="agregarItemOrden()">+ Agregar ítem</button>
    <div style="text-align:right;font-size:14px;font-weight:700;margin-bottom:16px">Total: <span id="o-total">$0</span></div>
    <div class="modal-footer">
      <button class="btn" style="background:#eee;color:#555" onclick="cerrarModalOrden()">Cancelar</button>
      <button class="btn btn-success" onclick="crearOrden()">Crear orden</button>
    </div>
  </div>
</div>

<!-- Modal ver orden -->
<div class="modal-overlay" id="modal-ver-orden" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto">
  <div class="modal" style="max-width:700px">
    <div class="modal-title" id="ver-titulo">Orden de Compra</div>
    <div id="ver-info" style="margin-bottom:16px;font-size:13px;color:#555;display:grid;grid-template-columns:1fr 1fr;gap:8px"></div>
    <div class="card-title" style="margin-bottom:10px">Productos</div>
    <div id="ver-items"></div>
    <div style="text-align:right;font-size:14px;font-weight:700;margin:12px 0">Total: <span id="ver-total"></span></div>
    <div class="modal-footer" id="ver-footer">
      <button class="btn" style="background:#eee;color:#555" onclick="cerrarVerOrden()">Cerrar</button>
    </div>
  </div>
</div>

<!-- Modal proveedor -->
<div class="modal-overlay" id="modal-prov">
  <div class="modal" style="max-width:480px">
    <div class="modal-title" id="prov-titulo">Nuevo proveedor</div>
    <input type="hidden" id="p-id"/>
    <div class="form-row">
      <div class="campo"><label>Nombre *</label><input id="p-nombre"/></div>
      <div class="campo"><label>NIT</label><input id="p-nit" placeholder="900.000.000-1"/></div>
    </div>
    <div class="form-row">
      <div class="campo"><label>Teléfono</label><input id="p-tel"/></div>
      <div class="campo"><label>Email</label><input id="p-email" type="email"/></div>
    </div>
    <div class="campo" style="margin-bottom:16px"><label>Dirección</label><input id="p-dir"/></div>
    <div class="modal-footer">
      <button class="btn" style="background:#eee;color:#555" onclick="cerrarModalProv()">Cancelar</button>
      <button class="btn btn-success" onclick="guardarProv()">Guardar</button>
    </div>
  </div>
</div>

<script>
document.getElementById('base-css').textContent = CSS_BASE;
// Fix modal displays
document.getElementById('modal-orden').style.display = 'none';
document.getElementById('modal-ver-orden').style.display = 'none';
let productos = [], proveedores = [], itemsOrden = [];

function cambiarTab(id) {
  document.querySelectorAll('.tab,.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelector(`.tab[onclick="cambiarTab('${id}')"]`).classList.add('active');
  document.getElementById(`tab-${id}`).classList.add('active');
  if (id === 'proveedores') cargarProveedores();
}

async function init() {
  const sesion = await cargarSesion();
  if (!sesion) return;
  renderNav('/admin/compras', sesion);
  [productos, proveedores] = await Promise.all([
    fetch('/api/productos').then(r=>r.json()),
    fetch('/api/proveedores').then(r=>r.json()),
  ]);
  await cargarOrdenes();
}

async function cargarOrdenes() {
  const r = await fetch('/api/compras');
  const ordenes = await r.json();
  const tbody = document.getElementById('tabla-ordenes');
  if (!ordenes.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:30px">Sin órdenes de compra</td></tr>'; return; }
  const colores = { borrador:'gris', enviada:'azul', recibida:'verde', cancelada:'rojo' };
  tbody.innerHTML = ordenes.map(o => `<tr>
    <td><strong>#${o.id}</strong></td>
    <td>${o.proveedor||'—'}</td>
    <td>${badge(o.estado, colores[o.estado]||'gris')}</td>
    <td>${fmtMoneda(o.total)}</td>
    <td style="color:#888">${o.total_items||0} ítem(s)</td>
    <td style="font-size:12px;color:#888">${fmtFechaHora(o.creado_en)}</td>
    <td><div class="acciones">
      <button class="btn btn-primary btn-sm" onclick="verOrden(${o.id})">Ver</button>
      ${o.estado==='borrador'?`<button class="btn btn-warning btn-sm" onclick="recibirOrden(${o.id})">Recibir</button>`:''}
      ${o.estado==='borrador'?`<button class="btn btn-danger btn-sm" onclick="cancelarOrden(${o.id})">Cancelar</button>`:''}
    </div></td>
  </tr>`).join('');
}

async function cargarProveedores() {
  const r = await fetch('/api/proveedores');
  proveedores = await r.json();
  const tbody = document.getElementById('tabla-proveedores');
  if (!proveedores.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:30px">Sin proveedores</td></tr>'; return; }
  tbody.innerHTML = proveedores.map(p => `<tr>
    <td><strong>${p.nombre}</strong></td>
    <td>${p.nit||'—'}</td>
    <td>${p.telefono||'—'}</td>
    <td>${p.email||'—'}</td>
    <td>${badge(p.activo?'Activo':'Inactivo',p.activo?'verde':'rojo')}</td>
    <td><button class="btn btn-warning btn-sm" onclick='abrirEditarProv(${JSON.stringify(p)})'>Editar</button></td>
  </tr>`).join('');
}

function abrirNuevaOrden() {
  itemsOrden = [];
  const sel = document.getElementById('o-proveedor');
  sel.innerHTML = '<option value="">Seleccionar...</option>' + proveedores.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');
  document.getElementById('o-notas').value = '';
  renderItemsOrden();
  const m = document.getElementById('modal-orden');
  m.style.display = 'flex'; m.scrollTop = 0;
}
function cerrarModalOrden() { document.getElementById('modal-orden').style.display = 'none'; }

function agregarItemOrden() {
  itemsOrden.push({ producto_id:'', cantidad:1, precio_unit:0, lote_numero:'', fecha_vencimiento:'' });
  renderItemsOrden();
}

function renderItemsOrden() {
  const cont = document.getElementById('o-items');
  if (!itemsOrden.length) { cont.innerHTML = '<p style="color:#aaa;font-size:13px;margin-bottom:12px">Sin ítems. Agrega productos.</p>'; actualizarTotal(); return; }
  cont.innerHTML = itemsOrden.map((it,i) => `
    <div class="detalle-item" style="grid-template-columns:2fr 1fr 1fr 1fr 1fr auto">
      <select onchange="selProd(${i},this.value)" style="padding:7px;border:1.5px solid #d0d5dd;border-radius:7px;font-size:12px">
        <option value="">Producto...</option>
        ${productos.map(p=>`<option value="${p.id}" ${p.id==it.producto_id?'selected':''}>${p.nombre}</option>`).join('')}
      </select>
      <input type="number" min="1" value="${it.cantidad}" onchange="itemsOrden[${i}].cantidad=this.value;actualizarTotal()" style="padding:7px;border:1.5px solid #d0d5dd;border-radius:7px;font-size:12px"/>
      <input type="number" min="0" value="${it.precio_unit}" onchange="itemsOrden[${i}].precio_unit=this.value;actualizarTotal()" placeholder="Precio" style="padding:7px;border:1.5px solid #d0d5dd;border-radius:7px;font-size:12px"/>
      <input value="${it.lote_numero}" onchange="itemsOrden[${i}].lote_numero=this.value" placeholder="Lote" style="padding:7px;border:1.5px solid #d0d5dd;border-radius:7px;font-size:12px"/>
      <input type="date" value="${it.fecha_vencimiento}" onchange="itemsOrden[${i}].fecha_vencimiento=this.value" style="padding:7px;border:1.5px solid #d0d5dd;border-radius:7px;font-size:12px"/>
      <button onclick="eliminarItem(${i})" style="background:#fde8e8;color:#e74c3c;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:14px">✕</button>
    </div>
  `).join('');
  actualizarTotal();
}

function selProd(i, pid) {
  itemsOrden[i].producto_id = pid;
  const prod = productos.find(p => p.id == pid);
  if (prod) { itemsOrden[i].precio_unit = prod.precio_compra; }
  renderItemsOrden();
}

function eliminarItem(i) { itemsOrden.splice(i,1); renderItemsOrden(); }

function actualizarTotal() {
  const total = itemsOrden.reduce((s,it) => s + (parseFloat(it.cantidad)||0)*(parseFloat(it.precio_unit)||0), 0);
  document.getElementById('o-total').textContent = fmtMoneda(total);
}

async function crearOrden() {
  const body = {
    proveedor_id: document.getElementById('o-proveedor').value || null,
    notas: document.getElementById('o-notas').value,
    items: itemsOrden.filter(it => it.producto_id),
  };
  if (!body.items.length) return toast('Agrega al menos un producto','err');
  const r = await fetch('/api/compras', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  const data = await r.json();
  if (data.exito) { cerrarModalOrden(); toast('Orden creada'); cargarOrdenes(); }
  else toast(data.mensaje||'Error','err');
}

async function verOrden(id) {
  const r = await fetch(`/api/compras/${id}`);
  const o = await r.json();
  const colores = { borrador:'gris', enviada:'azul', recibida:'verde', cancelada:'rojo' };
  document.getElementById('ver-titulo').textContent = `Orden #${o.id}`;
  document.getElementById('ver-info').innerHTML = `
    <div><strong>Proveedor:</strong> ${o.proveedor||'—'}</div>
    <div><strong>Estado:</strong> ${badge(o.estado, colores[o.estado]||'gris')}</div>
    <div><strong>Fecha:</strong> ${fmtFechaHora(o.creado_en)}</div>
    <div><strong>Notas:</strong> ${o.notas||'—'}</div>
  `;
  const items = o.items || [];
  document.getElementById('ver-items').innerHTML = items.length
    ? `<table style="width:100%;font-size:13px">
        <thead><tr><th style="padding:8px;background:#f5f6fa">Producto</th><th style="padding:8px;background:#f5f6fa">Cantidad</th><th style="padding:8px;background:#f5f6fa">Precio</th><th style="padding:8px;background:#f5f6fa">Subtotal</th><th style="padding:8px;background:#f5f6fa">Lote</th></tr></thead>
        <tbody>${items.map(it=>`<tr>
          <td style="padding:8px">${it.producto}</td>
          <td style="padding:8px">${it.cantidad}</td>
          <td style="padding:8px">${fmtMoneda(it.precio_unit)}</td>
          <td style="padding:8px"><strong>${fmtMoneda(it.cantidad*it.precio_unit)}</strong></td>
          <td style="padding:8px;font-size:11px;color:#888">${it.lote_numero||'—'}</td>
        </tr>`).join('')}</tbody>
      </table>`
    : '<p style="color:#aaa">Sin ítems</p>';
  document.getElementById('ver-total').textContent = fmtMoneda(o.total);
  const footer = document.getElementById('ver-footer');
  footer.innerHTML = `<button class="btn" style="background:#eee;color:#555" onclick="cerrarVerOrden()">Cerrar</button>`;
  if (o.estado==='borrador') {
    footer.innerHTML += ` <button class="btn btn-success" onclick="recibirOrden(${id});cerrarVerOrden()">Marcar como recibida</button>`;
    footer.innerHTML += ` <button class="btn btn-danger" onclick="cancelarOrden(${id});cerrarVerOrden()">Cancelar orden</button>`;
  }
  const m = document.getElementById('modal-ver-orden');
  m.style.display = 'flex'; m.scrollTop = 0;
}
function cerrarVerOrden() { document.getElementById('modal-ver-orden').style.display = 'none'; }

async function recibirOrden(id) {
  if (!confirmar('¿Marcar esta orden como recibida? Esto actualizará el stock automáticamente.')) return;
  const r = await fetch(`/api/compras/${id}/recibir`, { method:'PUT' });
  const data = await r.json();
  if (data.exito) { toast('Orden recibida y stock actualizado'); cargarOrdenes(); }
  else toast(data.mensaje||'Error','err');
}

async function cancelarOrden(id) {
  if (!confirmar('¿Cancelar esta orden de compra?')) return;
  const r = await fetch(`/api/compras/${id}/cancelar`, { method:'PUT' });
  const data = await r.json();
  if (data.exito) { toast('Orden cancelada'); cargarOrdenes(); }
  else toast(data.mensaje||'Error','err');
}

function abrirModalProv() {
  document.getElementById('prov-titulo').textContent = 'Nuevo proveedor';
  document.getElementById('p-id').value = '';
  ['p-nombre','p-nit','p-tel','p-email','p-dir'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modal-prov').classList.add('open');
}
function cerrarModalProv() { document.getElementById('modal-prov').classList.remove('open'); }

function abrirEditarProv(p) {
  document.getElementById('prov-titulo').textContent = 'Editar proveedor';
  document.getElementById('p-id').value = p.id;
  document.getElementById('p-nombre').value = p.nombre;
  document.getElementById('p-nit').value = p.nit||'';
  document.getElementById('p-tel').value = p.telefono||'';
  document.getElementById('p-email').value = p.email||'';
  document.getElementById('p-dir').value = p.direccion||'';
  document.getElementById('modal-prov').classList.add('open');
}

async function guardarProv() {
  const id = document.getElementById('p-id').value;
  const body = {
    nombre: document.getElementById('p-nombre').value,
    nit: document.getElementById('p-nit').value,
    telefono: document.getElementById('p-tel').value,
    email: document.getElementById('p-email').value,
    direccion: document.getElementById('p-dir').value,
  };
  if (!body.nombre) return toast('El nombre es requerido','err');
  const url = id ? `/api/proveedores/${id}` : '/api/proveedores';
  const r = await fetch(url, { method: id?'PUT':'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  const data = await r.json();
  if (data.exito !== false) { cerrarModalProv(); toast('Proveedor guardado'); cargarProveedores(); }
  else toast(data.mensaje||'Error','err');
}

init();
</script>
</body>
</html>
