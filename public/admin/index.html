<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard — MASTERISADO</title>
  <script src="/admin/layout.js"></script>
  <style id="base-css"></style>
  <style>
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 16px; margin-bottom: 24px; }
    .kpi { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); border-left: 4px solid #4A90D9; }
    .kpi.verde { border-left-color: #27AE60; }
    .kpi.naranja { border-left-color: #f39c12; }
    .kpi.rojo { border-left-color: #e74c3c; }
    .kpi-label { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .kpi-valor { font-size: 28px; font-weight: 700; color: #1a1a2e; margin: 6px 0 2px; }
    .kpi-sub { font-size: 12px; color: #888; }
    .alertas { display: flex; flex-direction: column; gap: 10px; }
    .alerta { padding: 12px 16px; border-radius: 8px; font-size: 13px; display: flex; align-items: center; gap: 10px; }
    .alerta.roja  { background: #fff0f0; border-left: 4px solid #e74c3c; color: #c0392b; }
    .alerta.naranja { background: #fff8e6; border-left: 4px solid #f39c12; color: #856404; }
    .alerta.verde { background: #f0fff4; border-left: 4px solid #27AE60; color: #1e7e34; }
  </style>
</head>
<body>
<header>
  <h1>MASTERISADO</h1>
  <div class="header-right">
    <span id="usuario-nombre"></span>
    <form action="/logout" method="POST" style="margin:0"><button type="submit" class="btn-logout">Salir</button></form>
  </div>
</header>
<nav id="nav-links"></nav>

<main>
  <div class="kpi-grid" id="kpis">
    <div class="kpi"><div class="kpi-label">Cargando...</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <div class="card">
      <div class="card-title">⚠️ Alertas del sistema</div>
      <div class="alertas" id="alertas"></div>
    </div>
    <div class="card">
      <div class="card-title">🕒 Últimos movimientos</div>
      <div id="ultimos-mov" style="font-size:13px;color:#666">Cargando...</div>
    </div>
  </div>
</main>

<script>
document.getElementById('base-css').textContent = CSS_BASE;

async function init() {
  const sesion = await cargarSesion();
  if (!sesion) return;
  renderNav('/admin', sesion);

  const [kpi, movs] = await Promise.all([
    fetch('/api/dashboard').then(r=>r.json()),
    fetch('/api/stock/kardex?limit=8').then(r=>r.json()).catch(()=>[])
  ]);

  document.getElementById('kpis').innerHTML = `
    <div class="kpi verde">
      <div class="kpi-label">Productos activos</div>
      <div class="kpi-valor">${kpi.productos.total}</div>
      <div class="kpi-sub">Valorización: ${fmtMoneda(kpi.productos.valoracion)}</div>
    </div>
    <div class="kpi ${parseInt(kpi.bajo_stock.total)>0?'naranja':'verde'}">
      <div class="kpi-label">Stock bajo / reorden</div>
      <div class="kpi-valor">${kpi.bajo_stock.total}</div>
      <div class="kpi-sub">Productos que requieren reabastecimiento</div>
    </div>
    <div class="kpi azul" style="border-left-color:#4A90D9">
      <div class="kpi-label">Ventas (últimos 30 días)</div>
      <div class="kpi-valor">${kpi.ventas_mes.total}</div>
      <div class="kpi-sub">Total: ${fmtMoneda(kpi.ventas_mes.monto)}</div>
    </div>
    <div class="kpi ${parseInt(kpi.vencimientos.total)>0?'rojo':'verde'}">
      <div class="kpi-label">Vencen en 30 días</div>
      <div class="kpi-valor">${kpi.vencimientos.total}</div>
      <div class="kpi-sub">Lotes próximos a vencer</div>
    </div>
  `;

  const alertas = [];
  if (parseInt(kpi.bajo_stock.total) > 0)
    alertas.push(`<div class="alerta naranja">⚠ ${kpi.bajo_stock.total} producto(s) con stock bajo o en punto de reorden</div>`);
  if (parseInt(kpi.vencimientos.total) > 0)
    alertas.push(`<div class="alerta roja">🗓 ${kpi.vencimientos.total} lote(s) vencen en los próximos 30 días</div>`);
  if (!alertas.length)
    alertas.push(`<div class="alerta verde">✅ Sin alertas críticas en este momento</div>`);
  document.getElementById('alertas').innerHTML = alertas.join('');

  document.getElementById('ultimos-mov').innerHTML = Array.isArray(movs) && movs.length
    ? `<table style="width:100%">
        <thead><tr><th style="padding:6px;color:#888;font-size:11px">Fecha</th><th style="padding:6px;color:#888;font-size:11px">Producto</th><th style="padding:6px;color:#888;font-size:11px">Tipo</th><th style="padding:6px;color:#888;font-size:11px">Cant.</th></tr></thead>
        <tbody>${movs.map(m=>`<tr>
          <td style="padding:6px;font-size:12px;color:#888">${fmtFechaHora(m.creado_en)}</td>
          <td style="padding:6px;font-size:12px">${m.producto}</td>
          <td style="padding:6px">${badge(m.tipo, m.tipo==='entrada'||m.tipo==='compra'||m.tipo==='devolucion'?'verde':'rojo')}</td>
          <td style="padding:6px;font-weight:700">${m.tipo==='entrada'||m.tipo==='compra'||m.tipo==='devolucion'?'+':'−'}${m.cantidad}</td>
        </tr>`).join('')}</tbody>
      </table>`
    : '<p style="color:#aaa;font-size:13px">Sin movimientos recientes</p>';
}
init();
</script>
</body>
</html>
