<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro — MASTERISADO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 24px; font-weight: 700; color: #1a1a2e; letter-spacing: 1px; }
    .logo p { font-size: 13px; color: #888; margin-top: 4px; }
    .campo { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #d0d5dd;
      border-radius: 8px; font-size: 14px;
      color: #1a1a2e; outline: none; transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus { border-color: #27AE60; }
    input.invalido { border-color: #e74c3c; }
    input.valido { border-color: #27AE60; }
    .hint { font-size: 11px; color: #aaa; margin-top: 4px; }
    .hint.err { color: #e74c3c; }
    .btn {
      width: 100%; padding: 12px;
      background: #27AE60; color: white;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: background 0.2s;
    }
    .btn:hover { background: #219a52; }
    .btn:disabled { background: #a0d4b5; cursor: not-allowed; }
    .mensaje {
      display: none; border-radius: 8px;
      padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
    }
    .error  { background: #fff0f0; border: 1px solid #f5c6c6; color: #c0392b; }
    .exito  { background: #f0fff4; border: 1px solid #b7ebc8; color: #1e7e34; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>MASTERISADO</h1>
      <p>Crear nueva cuenta</p>
    </div>

    <div class="mensaje error" id="msg-error"></div>
    <div class="mensaje exito" id="msg-exito"></div>

    <form id="form-registro">
      <div class="campo">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" placeholder="Tu nombre completo" required />
      </div>
      <div class="campo">
        <label for="usuario">Usuario *</label>
        <input type="text" id="usuario" placeholder="max8car" maxlength="8" autocomplete="username" required />
        <div class="hint" id="hint-usuario">Solo letras y números, máximo 8 caracteres</div>
      </div>
      <div class="campo">
        <label for="password">Contraseña *</label>
        <input type="password" id="password" placeholder="máx. 8 caracteres" maxlength="8" autocomplete="new-password" required />
        <div class="hint" id="hint-password">Máximo 8 caracteres — letras, números y símbolos</div>
      </div>
      <button type="submit" class="btn" id="btn-registro">Crear cuenta</button>
    </form>

    <div style="text-align:center;margin-top:20px;font-size:13px;color:#666;">
      ¿Ya tienes cuenta? <a href="/login" style="color:#4A90D9;font-weight:600;text-decoration:none;">Inicia sesión</a>
    </div>
  </div>

  <script>
    const inputUsuario = document.getElementById('usuario');
    const inputPassword = document.getElementById('password');
    const hintUsuario = document.getElementById('hint-usuario');
    const hintPassword = document.getElementById('hint-password');

    // Solo alfanumérico en usuario
    inputUsuario.addEventListener('input', function() {
      this.value = this.value.replace(/[^a-zA-Z0-9]/g, '');
      const ok = /^[a-zA-Z0-9]{1,8}$/.test(this.value);
      this.className = this.value ? (ok ? 'valido' : 'invalido') : '';
      hintUsuario.className = ok || !this.value ? 'hint' : 'hint err';
    });

    inputPassword.addEventListener('input', function() {
      const ok = this.value.length >= 1 && this.value.length <= 8;
      this.className = this.value ? (ok ? 'valido' : 'invalido') : '';
      hintPassword.className = ok || !this.value ? 'hint' : 'hint err';
    });

    const msgError = document.getElementById('msg-error');
    const msgExito = document.getElementById('msg-exito');
    const btn = document.getElementById('btn-registro');

    document.getElementById('form-registro').addEventListener('submit', async (e) => {
      e.preventDefault();
      msgError.style.display = 'none';
      msgExito.style.display = 'none';

      const nombre   = document.getElementById('nombre').value.trim();
      const usuario  = inputUsuario.value.trim();
      const password = inputPassword.value;

      if (!nombre) { msgError.textContent = 'Ingresa tu nombre completo'; msgError.style.display = 'block'; return; }
      if (!/^[a-zA-Z0-9]{1,8}$/.test(usuario)) {
        msgError.textContent = 'El usuario solo puede tener letras y números (máx. 8 caracteres)';
        msgError.style.display = 'block'; return;
      }
      if (!password || password.length > 8) {
        msgError.textContent = 'La contraseña debe tener máximo 8 caracteres';
        msgError.style.display = 'block'; return;
      }

      btn.disabled = true;
      btn.textContent = 'Registrando...';

      try {
        const res = await fetch('/registro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, usuario, password }),
        });
        const data = await res.json();

        if (data.exito) {
          msgExito.textContent = '¡Cuenta creada! Redirigiendo al inicio de sesión...';
          msgExito.style.display = 'block';
          setTimeout(() => window.location.href = '/login', 1500);
        } else {
          msgError.textContent = data.mensaje;
          msgError.style.display = 'block';
        }
      } catch {
        msgError.textContent = 'Error de conexión. Intenta de nuevo.';
        msgError.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
      }
    });
  </script>
</body>
</html>
