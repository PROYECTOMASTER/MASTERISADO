<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configurar Productos — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; min-height: 100vh; }

    header { background: #1a1a2e; color: white; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 18px; letter-spacing: 1px; }
    .badge-admin { background: #4A90D9; color: white; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-left: 8px; }

    nav { background: #252545; display: flex; gap: 4px; padding: 0 28px; }
    nav a { color: #aab; text-decoration: none; padding: 12px 20px; font-size: 13px; font-weight: 600; display: block; border-bottom: 3px solid transparent; transition: all 0.2s; }
    nav a:hover { color: white; }
    nav a.active { color: white; border-bottom-color: #4A90D9; }

    .header-right { display: flex; gap: 16px; align-items: center; }
    .header-right a { color: #aab; font-size: 13px; text-decoration: none; }
    .btn-logout { background: none; border: none; color: #aab; cursor: pointer; font-size: 13px; }

    main { max-width: 1100px; margin: 32px auto; padding: 0 20px; }

    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 24px; }
    .card-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 18px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid .full { grid-column: 1 / -1; }
    label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; }
    input, textarea, select { width: 100%; padding: 9px 12px; border: 1.5px solid #d0d5dd; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.2s; }
    input:focus, textarea:focus { border-color: #4A90D9; }
    textarea { resize: vertical; min-height: 70px; }

    .btn { padding: 9px 20px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #4A90D9; color: white; }
    .btn-success { background: #27AE60; color: white; }
    .btn-danger  { background: #e74c3c; color: white; padding: 6px 12px; font-size: 12px; }
    .btn-edit    { background: #f39c12; color: white; padding: 6px 12px; font-size: 12px; }

    .tabla-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f5f6fa; color: #555; font-weight: 600; padding: 11px 14px; text-align: left; border-bottom: 2px solid #e8eaf0; }
    td { padding: 11px 14px; border-bottom: 1px solid #f0f0f5; color: #333; vertical-align: middle; }
    tr:hover td { background: #fafbff; }

    .badge-activo   { background: #e8f8ee; color: #27AE60; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge-inactivo { background: #fde8e8; color: #e74c3c; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .stock-bajo { color: #e74c3c; font-weight: 700; }
    .stock-ok   { color: #27AE60; font-weight: 600; }
    .acciones   { display: flex; gap: 6px; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .search-input { padding: 8px 14px; border-radius: 8px; border: 1.5px solid #d0d5dd; font-size: 13px; outline: none; width: 220px; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 12px; padding: 28px; width: 100%; max-width: 500px; }
    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; color: #1a1a2e; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }
    .msg-ok  { background: #f0fff4; border: 1px solid #b7ebc8; color: #1e7e34; }
    .msg-err { background: #fff0f0; border: 1px solid #f5c6c6; color: #c0392b; }
  </style>
</head>
<body>

<header>
  <h1>MASTERISADO <span class="badge-admin">ADMIN</span></h1>
  <div class="header-right">
    <a href="/tienda">Ver tienda</a>
    <form action="/logout" method="POST" style="margin:0">
      <button type="submit" class="btn-logout">Salir</button>
    </form>
  </div>
</header>

<nav>
  <a href="/admin/productos" class="active">⚙️ Configurar productos</a>
  <a href="/admin/stock">📦 Control de stock</a>
</nav>

<main>
  <div class="card">
    <div class="card-title">Agregar nuevo producto</div>
    <div class="msg msg-ok" id="msg-ok">Producto guardado correctamente.</div>
    <div class="msg msg-err" id="msg-err"></div>
    <form id="form-nuevo">
      <div class="form-grid">
        <div>
          <label>Nombre del producto *</label>
          <input type="text" id="n-nombre" required placeholder="Ej: Cuaderno universitario" />
        </div>
        <div>
          <label>Precio de venta *</label>
          <input type="number" id="n-precio" required min="0" step="0.01" placeholder="0.00" />
        </div>
        <div>
          <label>Stock inicial</label>
          <input type="number" id="n-stock" min="0" placeholder="0" value="0" />
        </div>
        <div>
          <label>URL de imagen (opcional)</label>
          <input type="text" id="n-imagen" placeholder="https://..." />
        </div>
        <div class="full">
          <label>Descripción</label>
          <textarea id="n-descripcion" placeholder="Descripción breve del producto..."></textarea>
        </div>
      </div>
      <div style="margin-top:16px; text-align:right">
        <button type="submit" class="btn btn-success">+ Agregar producto</button>
      </div>
    </form>
  </div>

  <div class="card">
    <div class="top-bar">
      <div class="card-title" style="margin:0">Lista de productos y precios</div>
      <input class="search-input" type="text" id="buscador" placeholder="Buscar producto..." oninput="filtrar()" />
    </div>
    <div class="tabla-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Producto</th>
            <th>Precio</th>
            <th>Stock actual</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-body">
          <tr><td colspan="6" style="text-align:center;color:#aaa;padding:30px">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Modal editar -->
<div class="modal-overlay" id="modal-editar">
  <div class="modal">
    <h3>Editar producto</h3>
    <input type="hidden" id="e-id" />
    <div class="form-grid">
      <div>
        <label>Nombre *</label>
        <input type="text" id="e-nombre" required />
      </div>
      <div>
        <label>Precio *</label>
        <input type="number" id="e-precio" required min="0" step="0.01" />
      </div>
      <div>
        <label>Estado</label>
        <select id="e-activo">
          <option value="true">Activo</option>
          <option value="false">Inactivo</option>
        </select>
      </div>
      <div>
        <label>URL de imagen</label>
        <input type="text" id="e-imagen" />
      </div>
      <div class="full">
        <label>Descripción</label>
        <textarea id="e-descripcion"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" style="background:#eee;color:#555" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEdicion()">Guardar cambios</button>
    </div>
  </div>
</div>

<script>
  let productos = [];

  async function cargarProductos() {
    const r = await fetch('/api/admin/productos');
    productos = await r.json();
    renderTabla(productos);
  }

  function renderTabla(lista) {
    const tbody = document.getElementById('tabla-body');
    if (!lista.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:30px">Sin productos</td></tr>';
      return;
    }
    tbody.innerHTML = lista.map(p => `
      <tr>
        <td>${p.id}</td>
        <td>
          <strong>${p.nombre}</strong>
          ${p.descripcion ? `<br><span style="color:#888;font-size:11px">${p.descripcion}</span>` : ''}
        </td>
        <td><strong>$${parseFloat(p.precio).toLocaleString('es-CO', {minimumFractionDigits:2})}</strong></td>
        <td class="${p.stock <= 5 ? 'stock-bajo' : 'stock-ok'}">${p.stock} uds</td>
        <td><span class="${p.activo ? 'badge-activo' : 'badge-inactivo'}">${p.activo ? 'Activo' : 'Inactivo'}</span></td>
        <td>
          <div class="acciones">
            <button class="btn btn-edit" onclick='abrirEditar(${JSON.stringify(p)})'>Editar</button>
            <button class="btn btn-danger" onclick="desactivar(${p.id})">Desactivar</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function filtrar() {
    const q = document.getElementById('buscador').value.toLowerCase();
    renderTabla(productos.filter(p => p.nombre.toLowerCase().includes(q)));
  }

  document.getElementById('form-nuevo').addEventListener('submit', async e => {
    e.preventDefault();
    const body = {
      nombre: document.getElementById('n-nombre').value,
      descripcion: document.getElementById('n-descripcion').value,
      precio: document.getElementById('n-precio').value,
      stock: document.getElementById('n-stock').value || 0,
      imagen_url: document.getElementById('n-imagen').value,
    };
    const r = await fetch('/api/admin/productos', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await r.json();
    const ok = document.getElementById('msg-ok');
    const err = document.getElementById('msg-err');
    if (data.exito) {
      ok.style.display = 'block';
      document.getElementById('form-nuevo').reset();
      setTimeout(() => ok.style.display = 'none', 3000);
      cargarProductos();
    } else {
      err.textContent = data.mensaje;
      err.style.display = 'block';
    }
  });

  function abrirEditar(p) {
    document.getElementById('e-id').value = p.id;
    document.getElementById('e-nombre').value = p.nombre;
    document.getElementById('e-precio').value = p.precio;
    document.getElementById('e-descripcion').value = p.descripcion || '';
    document.getElementById('e-imagen').value = p.imagen_url || '';
    document.getElementById('e-activo').value = p.activo ? 'true' : 'false';
    document.getElementById('modal-editar').classList.add('open');
  }

  function cerrarModal() {
    document.getElementById('modal-editar').classList.remove('open');
  }

  async function guardarEdicion() {
    const id = document.getElementById('e-id').value;
    const body = {
      nombre: document.getElementById('e-nombre').value,
      descripcion: document.getElementById('e-descripcion').value,
      precio: document.getElementById('e-precio').value,
      stock: null,
      imagen_url: document.getElementById('e-imagen').value,
      activo: document.getElementById('e-activo').value === 'true',
    };
    const r = await fetch(`/api/admin/productos/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await r.json();
    if (data.exito) { cerrarModal(); cargarProductos(); }
  }

  async function desactivar(id) {
    if (!confirm('¿Desactivar este producto? Ya no aparecerá en la tienda.')) return;
    await fetch(`/api/admin/productos/${id}`, { method: 'DELETE' });
    cargarProductos();
  }

  cargarProductos();
</script>
</body>
</html>
