<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — MASTERISADO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 1px;
    }

    .logo p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .campo {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d0d5dd;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #4A90D9; }

    .btn {
      width: 100%;
      padding: 12px;
      background: #4A90D9;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .btn:hover { background: #357ABD; }
    .btn:disabled { background: #a0bfdf; cursor: not-allowed; }

    .error {
      display: none;
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      color: #c0392b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .credenciales {
      margin-top: 24px;
      padding: 12px 14px;
      background: #f0f6ff;
      border-radius: 8px;
      font-size: 12px;
      color: #555;
    }

    .credenciales strong { color: #4A90D9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>MASTERISADO</h1>
      <p>Ingresa tus credenciales para continuar</p>
    </div>

    <div class="error" id="error-msg"></div>

    <form id="form-login">
      <div class="campo">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required />
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn" id="btn-login">Ingresar</button>
    </form>

    <div style="text-align:center; margin-top:20px; font-size:13px; color:#666;">
      ¿No tienes cuenta? <a href="/registro" style="color:#4A90D9; font-weight:600; text-decoration:none;">Regístrate</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('form-login');
    const errorMsg = document.getElementById('error-msg');
    const btnLogin = document.getElementById('btn-login');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      btnLogin.disabled = true;
      btnLogin.textContent = 'Ingresando...';

      const body = new URLSearchParams({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      });

      try {
        const res = await fetch('/login', { method: 'POST', body });
        const data = await res.json();

        if (data.exito) {
          window.location.href = '/dashboard';
        } else {
          errorMsg.textContent = data.mensaje;
          errorMsg.style.display = 'block';
        }
      } catch {
        errorMsg.textContent = 'Error de conexión. Intenta de nuevo.';
        errorMsg.style.display = 'block';
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
