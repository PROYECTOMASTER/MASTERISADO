<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — MASTERISADO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 24px; font-weight: 700; color: #1a1a2e; letter-spacing: 1px; }
    .logo p { font-size: 13px; color: #888; margin-top: 4px; }
    .campo { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #d0d5dd;
      border-radius: 8px; font-size: 14px;
      color: #1a1a2e; outline: none; transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus { border-color: #4A90D9; }
    .hint { font-size: 11px; color: #aaa; margin-top: 4px; }
    .btn {
      width: 100%; padding: 12px;
      background: #4A90D9; color: white;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: background 0.2s;
    }
    .btn:hover { background: #357ABD; }
    .btn:disabled { background: #a0bfdf; cursor: not-allowed; }
    .error {
      display: none;
      background: #fff0f0; border: 1px solid #f5c6c6;
      color: #c0392b; border-radius: 8px;
      padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>MASTERISADO</h1>
      <p>Ingresa tus credenciales para continuar</p>
    </div>

    <div class="error" id="error-msg"></div>

    <form id="form-login">
      <div class="campo">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" placeholder="usuario" maxlength="8" autocomplete="username" required />
        <div class="hint">Máximo 8 caracteres alfanuméricos</div>
      </div>
      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" maxlength="8" autocomplete="current-password" required />
        <div class="hint">Máximo 8 caracteres</div>
      </div>
      <button type="submit" class="btn" id="btn-login">Ingresar</button>
    </form>

    <div style="text-align:center;margin-top:20px;font-size:13px;color:#666;">
      ¿No tienes cuenta? <a href="/registro" style="color:#4A90D9;font-weight:600;text-decoration:none;">Regístrate</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('form-login');
    const errorMsg = document.getElementById('error-msg');
    const btnLogin = document.getElementById('btn-login');

    // Solo letras y números en el campo usuario
    document.getElementById('usuario').addEventListener('input', function() {
      this.value = this.value.replace(/[^a-zA-Z0-9]/g, '');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      btnLogin.disabled = true;
      btnLogin.textContent = 'Ingresando...';

      const usuario = document.getElementById('usuario').value.trim();
      const password = document.getElementById('password').value;

      if (!/^[a-zA-Z0-9]{1,8}$/.test(usuario)) {
        errorMsg.textContent = 'El usuario solo puede tener letras y números (máx. 8)';
        errorMsg.style.display = 'block';
        btnLogin.disabled = false;
        btnLogin.textContent = 'Ingresar';
        return;
      }

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, password }),
        });
        const data = await res.json();

        if (data.exito) {
          window.location.href = data.destino;
        } else {
          errorMsg.textContent = data.mensaje;
          errorMsg.style.display = 'block';
        }
      } catch {
        errorMsg.textContent = 'Error de conexión. Intenta de nuevo.';
        errorMsg.style.display = 'block';
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
